<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jiran Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --white: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --radius: 6px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH ─────────────────────────────────── */
    #auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .auth-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-card p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.9rem;
      background: var(--white);
      color: var(--text);
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .field { margin-bottom: 18px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--bg); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      font-size: 0.82rem;
      color: var(--danger);
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }

    /* ── DASHBOARD ────────────────────────────── */
    #dashboard-page { display: none; }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.02em;
    }

    header .meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.83rem;
      color: var(--muted);
    }

    main { padding: 28px 24px; max-width: 1200px; margin: 0 auto; }

    .page-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* ── TABLE ────────────────────────────────── */
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      background: var(--bg);
      padding: 11px 14px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    tbody td {
      padding: 11px 14px;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-active   { background: #dcfce7; color: #16a34a; }
    .badge-inactive { background: #fee2e2; color: #dc2626; }
    .badge-pending  { background: #fef9c3; color: #ca8a04; }
    .badge-default  { background: #f1f5f9; color: #475569; }

    /* ── LOADING / EMPTY ──────────────────────── */
    .state-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.875rem;
    }

    /* ── MODAL ────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error   { background: var(--danger); }
  </style>
</head>
<body>

<!-- ══ LOGIN PAGE ══════════════════════════════════════════ -->
<div id="auth-page">
  <div class="auth-card">
    <h1>Jiran Admin</h1>
    <p>Sign in to manage profiles</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- ══ DASHBOARD PAGE ══════════════════════════════════════ -->
<div id="dashboard-page">
  <header>
    <span class="brand">Jiran Admin</span>
    <div class="meta">
      <span id="admin-email-display"></span>
      <button class="btn btn-sm btn-outline" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>

  <main>
    <div class="page-title">Profiles</div>

    <div class="table-wrap">
      <table id="profiles-table">
        <thead>
          <tr>
            <th>#</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Gender</th>
            <th>Phone Number</th>
            <th>Account Status</th>
            <th>User Type</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="profiles-tbody">
          <tr class="state-row"><td colspan="8">Loading profiles…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ══ EDIT MODAL ══════════════════════════════════════════ -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>Edit Profile</h2>

    <div class="field">
      <label for="edit-firstName">First Name</label>
      <input type="text" id="edit-firstName"/>
    </div>
    <div class="field">
      <label for="edit-lastName">Last Name</label>
      <input type="text" id="edit-lastName"/>
    </div>
    <div class="field">
      <label for="edit-gender">Gender</label>
      <select id="edit-gender">
        <option value="">— select —</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label for="edit-phoneNumber">Phone Number</label>
      <input type="text" id="edit-phoneNumber"/>
    </div>
    <div class="field">
      <label for="edit-accountStatus">Account Status</label>
      <select id="edit-accountStatus">
        <option value="">— select —</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="pending">Pending</option>
        <option value="suspended">Suspended</option>
      </select>
    </div>
    <div class="field">
      <label for="edit-userType">User Type</label>
      <select id="edit-userType">
        <option value="">— select —</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
        <option value="landlord">Landlord</option>
        <option value="tenant">Tenant</option>
      </select>
    </div>

    <p class="error-msg" id="edit-error"></p>

    <div class="modal-footer">
      <button class="btn btn-sm btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" id="save-btn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ═══════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script>
  'use strict';

  const BASE_URL = 'https://jiran.space/api/v1';
  const TOKEN_KEY = 'jiran_admin_token';
  const EMAIL_KEY = 'jiran_admin_email';

  /* ── helpers ───────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  function getToken() {
    return sessionStorage.getItem(TOKEN_KEY);
  }

  function setToken(token, email) {
    sessionStorage.setItem(TOKEN_KEY, token);
    sessionStorage.setItem(EMAIL_KEY, email);
  }

  function clearToken() {
    sessionStorage.removeItem(TOKEN_KEY);
    sessionStorage.removeItem(EMAIL_KEY);
  }

  function showToast(msg, type = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  function setLoading(btnId, loading, label = 'Save Changes') {
    const btn = $(btnId);
    if (!btn) return;
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>'
      : label;
  }

  /* ── auth ──────────────────────────────────────────────── */
  async function handleLogin() {
    const email    = $('email').value.trim();
    const password = $('password').value;
    const errEl    = $('login-error');
    errEl.textContent = '';

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      return;
    }

    setLoading('login-btn', true, 'Sign In');

    try {
      const res = await fetch(`${BASE_URL}/auth/admin/signIn`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      console.log('res from admin sign in', res);
      console.log('data from admin sign in', data);

      if (!res.ok) {
        errEl.textContent = data?.message || 'Invalid credentials.';
        return;
      }

      // accept token wherever the API puts it
      const token = data?.access_token;

      if (!token) {
        errEl.textContent = 'Authentication failed. No token received.';
        return;
      }

      setToken(token, email);
      showDashboard(email);
      loadProfiles();

    } catch (err) {
      errEl.textContent = 'Network error. Please try again.';
    } finally {
      setLoading('login-btn', false, 'Sign In');
    }
  }

  function handleLogout() {
    clearToken();
    showLogin();
  }

  /* ── routing ───────────────────────────────────────────── */
  function showLogin() {
    $('auth-page').style.display      = 'flex';
    $('dashboard-page').style.display = 'none';
    $('email').value    = '';
    $('password').value = '';
    $('login-error').textContent = '';
  }

  function showDashboard(email) {
    $('auth-page').style.display      = 'none';
    $('dashboard-page').style.display = 'block';
    $('admin-email-display').textContent = email || '';
  }

  /* ── profiles list ─────────────────────────────────────── */
  async function loadProfiles() {
    const tbody = $('profiles-tbody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="8">Loading profiles…</td></tr>';

    const token = getToken();
    if (!token) { handleLogout(); return; }

    try {
      const res = await fetch(`${BASE_URL}/profiles`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 401 || res.status === 403) {
        clearToken();
        showLogin();
        return;
      }

      const data = await res.json();

      // handle various response shapes
      const profiles = Array.isArray(data)
        ? data
        : Array.isArray(data?.data)    ? data.data
        : Array.isArray(data?.profiles) ? data.profiles
        : [];

      if (!profiles.length) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="8">No profiles found.</td></tr>';
        return;
      }

      tbody.innerHTML = profiles.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${esc(p.firstName)}</td>
          <td>${esc(p.lastName)}</td>
          <td>${esc(p.gender)}</td>
          <td>${esc(p.phoneNumber)}</td>
          <td>${statusBadge(p.accountStatus)}</td>
          <td>${esc(p.userType)}</td>
          <td>
            <button class="btn btn-sm btn-outline"
              onclick="openEditModal('${esc(p._id || p.id)}')">Edit</button>
          </td>
        </tr>
      `).join('');

    } catch (err) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="8">Failed to load profiles.</td></tr>';
    }
  }

  function esc(val) {
    if (val == null) return '—';
    return String(val)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function statusBadge(status) {
    const s = (status || '').toLowerCase();
    const cls = s === 'active'   ? 'badge-active'
              : s === 'inactive' ? 'badge-inactive'
              : s === 'pending'  ? 'badge-pending'
              : 'badge-default';
    return `<span class="badge ${cls}">${esc(status)}</span>`;
  }

  /* ── edit modal ────────────────────────────────────────── */
  let currentProfileId = null;

  async function openEditModal(id) {
    currentProfileId = id;
    $('edit-error').textContent = '';

    // clear fields while loading
    ['firstName','lastName','gender','phoneNumber','accountStatus','userType']
      .forEach(f => { $(`edit-${f}`).value = ''; });

    $('edit-modal').classList.add('open');

    const token = getToken();
    if (!token) { handleLogout(); return; }

    try {
      const res = await fetch(`${BASE_URL}/profiles/${id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 401 || res.status === 403) {
        closeModal();
        clearToken();
        showLogin();
        return;
      }

      const data = await res.json();
      const p = data?.data || data?.profile || data;

      $('edit-firstName').value     = p.firstName     || '';
      $('edit-lastName').value      = p.lastName      || '';
      $('edit-gender').value        = p.gender        || '';
      $('edit-phoneNumber').value   = p.phoneNumber   || '';
      $('edit-accountStatus').value = p.accountStatus || '';
      $('edit-userType').value      = p.userType      || '';

    } catch (err) {
      $('edit-error').textContent = 'Could not load profile data.';
    }
  }

  function closeModal() {
    $('edit-modal').classList.remove('open');
    currentProfileId = null;
  }

  async function saveProfile() {
    if (!currentProfileId) return;
    $('edit-error').textContent = '';

    const payload = {
      firstName:     $('edit-firstName').value.trim(),
      lastName:      $('edit-lastName').value.trim(),
      gender:        $('edit-gender').value,
      phoneNumber:   $('edit-phoneNumber').value.trim(),
      accountStatus: $('edit-accountStatus').value,
      userType:      $('edit-userType').value,
    };

    setLoading('save-btn', true);

    const token = getToken();
    if (!token) { handleLogout(); return; }

    try {
      const res = await fetch(`${BASE_URL}/profiles/${currentProfileId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });

      if (res.status === 401 || res.status === 403) {
        closeModal();
        clearToken();
        showLogin();
        return;
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        $('edit-error').textContent = err?.message || 'Update failed.';
        return;
      }

      closeModal();
      showToast('Profile updated successfully.', 'success');
      loadProfiles();

    } catch (err) {
      $('edit-error').textContent = 'Network error. Please try again.';
    } finally {
      setLoading('save-btn', false);
    }
  }

  /* ── keyboard ──────────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if ($('auth-page').style.display !== 'none') handleLogin();
    }
    if (e.key === 'Escape') closeModal();
  });

  /* ── close modal on backdrop click ────────────────────── */
  $('edit-modal').addEventListener('click', e => {
    if (e.target === $('edit-modal')) closeModal();
  });

  /* ── init ──────────────────────────────────────────────── */
  (function init() {
    const token = getToken();
    if (token) {
      const email = sessionStorage.getItem(EMAIL_KEY) || '';
      showDashboard(email);
      loadProfiles();
    } else {
      showLogin();
    }
  })();
</script>
</body>
</html>
